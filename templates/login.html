<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | M UMAR Natural Remedies</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          herb: { 50:'#f0f7f2',100:'#dcebe1',200:'#b9d7c3',300:'#8fc0a1',400:'#5fa379',500:'#2f7a4e',600:'#296844',700:'#1f5236',800:'#16402a',900:'#0d2e1d' },
          gold: { 50:'#fdf9ec',100:'#f8eec7',200:'#f0dc94',300:'#e7c75d',400:'#dcae33',500:'#c9971f',600:'#a8801f',700:'#82601a',800:'#5c4012',900:'#3a2a0d' }
        },
        fontFamily: { display: ['Playfair Display','serif'], body: ['Poppins','sans-serif'] }
      }
    }
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="font-body bg-cream">

<section class="hero-section min-h-screen flex items-center justify-center px-6">
  <div class="leaf-decor w-40 h-40 top-16 left-[6%]" style="position:absolute;opacity:0.16;">
    <svg viewBox="0 0 100 100" fill="none"><path d="M50 5C30 25 15 45 15 65c0 19 16 30 35 30s35-11 35-30c0-20-15-40-35-60z" fill="#dcae33"/></svg>
  </div>

  <div class="max-w-md w-full" data-aos="zoom-in">
    <div class="text-center mb-8">
      <a href="{{ url_for('index') }}" class="inline-flex items-center gap-3 mb-6">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center text-herb-900 font-display font-bold text-xl shadow-lg">MU</div>
        <div class="leading-tight text-left">
          <p class="font-display text-white text-lg font-semibold">M UMAR</p>
          <p class="text-gold-300 text-[11px] tracking-widest uppercase">Natural Remedies</p>
        </div>
      </a>
      <p class="section-tag text-gold-300">Admin Access</p>
      <h1 class="font-display text-2xl font-bold text-white mt-2">Sign In to Dashboard</h1>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="space-y-3 mb-6">
      {% for category, message in messages %}
      <div class="flash-message rounded-xl px-5 py-4 text-sm font-medium {{ 'bg-red-50 text-red-700 border border-red-200' if category == 'error' else 'bg-herb-50 text-herb-800 border border-herb-200' }}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="card-premium p-8 md:p-10">
      <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
        <div>
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="admin" required autofocus>
        </div>
        <div>
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-gold w-full py-4 rounded-full font-semibold">Log In</button>
      </form>
    </div>

    <p class="text-center text-white/50 text-sm mt-6">
      <a href="{{ url_for('index') }}" class="hover:text-gold-300">&larr; Back to Website</a>
    </p>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
